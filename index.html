<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little House</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-image"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div id="app">
  <div class="app">

    <div class="header">
      <div class="header-title">Lucky 38</div>
      <div class="status-row">
      </div>
    </div>

    <div class="chat-window" ref="chatWindow">
      <div
        v-for="(msg, i) in messages"
        :key="i"
        :class="['message', msg.role]"
      >
        <div class="avatar">{{ msg.role === 'house' ? 'RH' : 'C' }}</div>
        <div>
          <div class="speaker-label">{{ msg.role === 'house' ? 'MR. HOUSE' : 'COURIER' }}</div>
          <div class="bubble">{{ msg.text }}</div>
        </div>
      </div>

      <div v-if="searching" class="search-notice">
        ACCESSING EXTERNAL DATA NETWORK... {{ searchQuery }}
      </div>

      <div v-if="loading && !searching" class="message house">
        <div class="avatar">RH</div>
        <div>
          <div class="speaker-label">MR. HOUSE</div>
          <div class="bubble">
            <div class="typing-bubble">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="input-row">
      <span class="prompt-label">COURIER &gt;</span>
      <input
        class="input-field"
        v-model="userInput"
        @keydown.enter="sendMessage"
        :disabled="loading"
        placeholder="What do you want to say?"
        autofocus
      />
      <button class="send-btn" @click="sendMessage" :disabled="loading || !userInput.trim()">
        Send
      </button>
    </div>

    <div class="footer">
    </div>

  </div>
</div>

<script>
const { createApp, ref, nextTick } = Vue;

createApp({
  setup() {
    const messages = ref([
      {
        role: 'house',
        text: "This meeting has been a long time coming, hasn't it? You've come a long way, literally and, I suspect, figuratively as well. State your business."
      }
    ]);
    const userInput = ref('');
    const loading = ref(false);
    const searching = ref(false);
    const searchQuery = ref('');
    const chatWindow = ref(null);

    const API_URL = 'ngrok_url_here/chat';  

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || loading.value) return;

      messages.value.push({ role: 'courier', text });
      userInput.value = '';
      loading.value = true;
      await scrollToBottom();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();

        if (data.searched) {
          searching.value = true;
          searchQuery.value = data.search_query || '';
          await new Promise(r => setTimeout(r, 800));
          searching.value = false;
        }

        loading.value = false;
        messages.value.push({ role: 'house', text: data.response });

      } catch (err) {
        loading.value = false;
        messages.value.push({
          role: 'house',
          text: '...A communication error. My Securitrons will look into it.'
        });
      }

      await scrollToBottom();
    }

    async function scrollToBottom() {
      await nextTick();
      if (chatWindow.value) {
        chatWindow.value.scrollTop = chatWindow.value.scrollHeight;
      }
    }

    return { messages, userInput, loading, searching, searchQuery, chatWindow, sendMessage };
  }
}).mount('#app');
</script>

</body>
</html>
